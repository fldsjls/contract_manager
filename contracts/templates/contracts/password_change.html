{% extends "contracts/base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
  <!-- 修改当前管理员账号密码。 -->
  <h1 class="page-title">修改密码</h1>

  <!-- 使用 Django 内置密码修改表单，自动校验旧密码和新密码规则。 -->
  <section class="panel">
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="form-grid">
        {% for field in form %}
          <div class="form-row full">
            <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
            {% if field.help_text %}
              <p style="color: #667085; margin: 6px 0 0;">{{ field.help_text }}</p>
            {% endif %}
          </div>
        {% endfor %}
      </div>
      <div class="toolbar" style="margin-top: 18px;">
        <button class="button primary" type="submit">保存新密码</button>
        <a class="button" href="{% url 'contracts:settings' %}">取消</a>
      </div>
    </form>
  </section>
{% endblock %}
