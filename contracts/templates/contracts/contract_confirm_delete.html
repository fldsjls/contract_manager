{% extends "contracts/base.html" %}
{% load contract_codes %}

{% block title %}删除合同{% endblock %}

{% block content %}
  <!-- 删除确认页，防止误删合同。 -->
  <h1 class="page-title">删除合同</h1>

  <!-- 提交 POST 后将合同移入回收站。 -->
  <form class="panel" method="post">
    {% csrf_token %}
    <p>确定要将以下合同移入回收站吗？一周内可恢复，超过后自动清理。</p>
    <p><strong>{{ contract.contract_name }}</strong>（<span class="{% if contract.uses_default_display_contract_number or contract.missing_storage_position %}default-contract-number{% endif %}">{{ contract.display_contract_number|display_code }}</span>）</p>

    <div class="toolbar">
      <button class="button danger" type="submit">移入回收站</button>
      <a class="button" href="{% url 'contracts:contract_list' %}">取消</a>
    </div>
  </form>
{% endblock %}
